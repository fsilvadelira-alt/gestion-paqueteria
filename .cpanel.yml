deployment:
  tasks:
    # Ruta raíz del subdominio rp.icautomatizacion.com en HostGator
    - export DEST=/home1/icautoma/rp.icautomatizacion.com

    # 1. Desplegar el frontend compilado (archivos React)
    - /bin/cp -R frontend/dist/. $DEST

    # 2. Desplegar el backend PHP en subcarpeta /api/
    - /bin/mkdir -p $DEST/api
    - /bin/cp -R backend-php/. $DEST/api